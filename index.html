<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple PDF Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <div class="toolbar-group toolbar-group-left">
        <strong class="title">TOXOS</strong>
      </div>
      <div class="toolbar-group toolbar-group-center">
        <button id="themeToggle" class="button" type="button" aria-label="Switch theme">
          Light Mode
        </button>
      </div>
      <div class="toolbar-group toolbar-group-right">
        <a
          id="downloadLink"
          class="button"
          href="./TOXOS_25-26.pdf"
          download="TOXOS_25-26.pdf"
          aria-label="Download PDF"
        >
          Download PDF
        </a>
      </div>
    </header>

    <main class="viewer-shell">
      <section id="status" class="status" aria-live="polite">Loading PDF...</section>
      <section id="viewer" class="viewer" aria-label="PDF document pages"></section>
    </main>

    <div id="scrollHint" class="scroll-hint" aria-hidden="true">&#8595;</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
